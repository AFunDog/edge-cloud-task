services:
  cloud:
    build: .
    command: uvicorn cloud_api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data

  edge:
    build: .
    command: uvicorn edge_api.main:app --host 0.0.0.0 --port 8001
    env_file:
      - path: .env
        required: false
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data

  cloud-web:
    build:
      context: ./src/cloud_frontend
    ports:
      - "8080:80"
    depends_on:
      - cloud

  edge-web:
    build:
      context: ./src/edge_frontend
    ports:
      - "8081:80"
    depends_on:
      - edge

  edge-runner:
    build:
      context: .
      dockerfile: Dockerfile.edge
    command: python -m edge_cloud_system.edge.runner --task "姿态识别"
    env_file:
      - path: .env
        required: false
    environment:
      EDGE_API_BASE_URL: http://edge:8001
      CLOUD_API_BASE_URL: http://cloud:8000
      PUBLIC_DIR: /app/public
    volumes:
      - ./public:/app/public:ro
    devices:
      - "/dev/video0:/dev/video0"
    depends_on:
      - edge
      - cloud
    profiles:
      - edge
