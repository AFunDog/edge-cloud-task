services:
  cloud:
    build: .
    command: uvicorn edge_cloud_system.api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data

  web:
    build:
      context: ./src/frontend
    ports:
      - "8080:80"
    depends_on:
      - cloud

  edge:
    build:
      context: .
      dockerfile: Dockerfile.edge
    command: python -m edge_cloud_system.edge.runner --task "车辆计数"
    env_file:
      - path: .env
        required: false
    environment:
      API_BASE_URL: http://cloud:8000
      PUBLIC_DIR: /app/public
    volumes:
      - ./public:/app/public:ro
    devices:
      - "/dev/video0:/dev/video0"
    depends_on:
      - cloud
    profiles:
      - edge
