services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: edge-cloud-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-edge_cloud}
      POSTGRES_USER: ${POSTGRES_USER:-edge_cloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edge_cloud_dev}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edge_cloud} -d ${POSTGRES_DB:-edge_cloud}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cloud:
    build:
      context: .
      dockerfile: Dockerfile.cloud
    command: uvicorn backend.cloud_api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_VECTOR_ENABLED: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  edge:
    build:
      context: .
      dockerfile: Dockerfile.edge
    command: uvicorn backend.edge_api.main:app --host 0.0.0.0 --port 8001
    env_file:
      - path: .env
        required: false
    ports:
      - "8001:8001"
    environment:
      EDGE_COLLECTOR_ENABLED: "false"
      CLOUD_API_BASE_URL: http://cloud:8000
      PUBLIC_DIR: /app/public
    volumes:
      - ./public:/app/public:ro

  cloud-web:
    build:
      context: ./src/frontend/cloud_frontend
    ports:
      - "8080:80"
    depends_on:
      - cloud

  edge-web:
    build:
      context: ./src/frontend/edge_frontend
    ports:
      - "8081:80"
    depends_on:
      - edge

  edge-runner:
    build:
      context: .
      dockerfile: Dockerfile.edge
    command: python -m backend.edge_api.runtime.runner --task "姿态识别"
    env_file:
      - path: .env
        required: false
    environment:
      EDGE_API_BASE_URL: http://edge:8001
      CLOUD_API_BASE_URL: http://cloud:8000
      PUBLIC_DIR: /app/public
    volumes:
      - ./public:/app/public:ro
    devices:
      - "/dev/video0:/dev/video0"
    depends_on:
      - edge
      - cloud
    profiles:
      - edge

volumes:
  postgres_data:
